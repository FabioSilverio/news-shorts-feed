<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#FF2244"/>
      <stop offset="100%" stop-color="#C8000A"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <rect x="16" y="46" width="148" height="90" rx="22" fill="url(#red)" filter="url(#shadow)"/>
  <rect x="16" y="46" width="148" height="40" rx="22" fill="white" opacity="0.07"/>
  <polygon points="68,63 68,117 121,90" fill="url(#play)"/>
</svg>
