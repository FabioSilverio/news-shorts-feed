<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#FF2244"/>
      <stop offset="100%" stop-color="#C8000A"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background: dark rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- YouTube-style red pill with drop shadow -->
  <rect x="9" y="25" width="82" height="51" rx="13" fill="url(#red)" filter="url(#shadow)"/>

  <!-- Subtle top highlight on red rect (gloss) -->
  <rect x="9" y="25" width="82" height="22" rx="13" fill="white" opacity="0.07"/>

  <!-- Play triangle — optically centered (shifted slightly right) -->
  <polygon points="38,35 38,65 67,50" fill="url(#play)"/>
</svg>
